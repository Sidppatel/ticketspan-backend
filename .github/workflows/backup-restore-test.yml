name: Restore Backup To Scratch Database

on:
  workflow_dispatch:
    inputs:
      backup_key:
        description: 'R2 object key to restore, or "latest"'
        required: true
        default: 'latest'

jobs:
  restore-to-scratch:
    runs-on: ubuntu-latest
    environment: production
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
      AWS_REQUEST_CHECKSUM_CALCULATION: when_required
      AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      PGPASSWORD: scratch
      SCRATCH_CONN: 'host=localhost port=5432 dbname=scratch user=scratch'

    services:
      scratch-postgres:
        image: postgres:17
        env:
          POSTGRES_USER: scratch
          POSTGRES_PASSWORD: scratch
          POSTGRES_DB: scratch
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U scratch"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - name: Install postgres client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-common
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-17
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"

      - name: Resolve backup key
        env:
          REQUESTED_KEY: ${{ inputs.backup_key }}
        run: |
          REQUESTED="$REQUESTED_KEY"
          if ! echo "$REQUESTED" | grep -qE '^(latest|backups/[0-9]{4}/[0-9]{2}/[0-9]{2}/[A-Za-z0-9_.-]+\.dump)$'; then
            echo "::error::backup_key must be \"latest\" or a backups/YYYY/MM/DD/<name>.dump key"
            exit 1
          fi
          if [ "$REQUESTED" = "latest" ]; then
            REQUESTED=$(aws s3api list-objects-v2 \
              --bucket "$R2_BUCKET_NAME" --prefix backups/ \
              --endpoint-url "$R2_ENDPOINT" \
              --query 'sort_by(Contents, &LastModified)[-1].Key' --output text)
          fi
          if [ -z "$REQUESTED" ] || [ "$REQUESTED" = "None" ]; then
            echo "::error::No backup found to restore"
            exit 1
          fi
          echo "BACKUP_KEY=$REQUESTED" >> "$GITHUB_ENV"
          echo "Restoring $REQUESTED"

      - name: Download backup
        run: |
          aws s3 cp "s3://${R2_BUCKET_NAME}/${BACKUP_KEY}" restore.dump \
            --endpoint-url "$R2_ENDPOINT" --only-show-errors
          if [ ! -s restore.dump ]; then
            echo "::error::Downloaded backup is empty"
            exit 1
          fi
          pg_restore --list restore.dump > /dev/null

      - name: Restore into scratch database
        run: |
          START=$(date +%s)
          pg_restore --dbname="$SCRATCH_CONN" --no-owner --no-acl --no-comments restore.dump 2> restore.log || true
          echo "RESTORE_SECONDS=$(( $(date +%s) - START ))" >> "$GITHUB_ENV"
          echo "Restore stderr (role and extension grants are expected to fail on a scratch instance):"
          tail -20 restore.log || true

      - name: Verify restored database
        run: |
          TABLES=$(psql "$SCRATCH_CONN" -tAc "SELECT count(*) FROM pg_tables WHERE schemaname='public'")
          echo "Restored tables: $TABLES"
          if [ "$TABLES" -lt 1 ]; then
            echo "::error::Restore produced no tables"
            exit 1
          fi
          psql "$SCRATCH_CONN" -v ON_ERROR_STOP=1 -tAc "
            DO \$\$
            BEGIN
              IF NOT EXISTS (SELECT 1 FROM pg_tables WHERE schemaname='public' AND tablename='tenants') THEN
                RAISE EXCEPTION 'tenants table missing from restored backup';
              END IF;
              IF NOT EXISTS (SELECT 1 FROM pg_tables WHERE schemaname='public' AND tablename='events') THEN
                RAISE EXCEPTION 'events table missing from restored backup';
              END IF;
              IF NOT EXISTS (SELECT 1 FROM information_schema.tables
                             WHERE table_schema='public' AND table_name='__EFMigrationsHistory') THEN
                RAISE EXCEPTION 'migration history missing from restored backup';
              END IF;
            END \$\$;"
          MIGRATION_HEAD=$(psql "$SCRATCH_CONN" -tAc 'SELECT migration_id FROM "__EFMigrationsHistory" ORDER BY migration_id DESC LIMIT 1')
          TENANT_COUNT=$(psql "$SCRATCH_CONN" -tAc 'SELECT count(*) FROM tenants')
          echo "RESTORED_TABLES=$TABLES" >> "$GITHUB_ENV"
          echo "MIGRATION_HEAD=$MIGRATION_HEAD" >> "$GITHUB_ENV"
          echo "TENANT_COUNT=$TENANT_COUNT" >> "$GITHUB_ENV"

      - name: Write job summary
        if: always()
        run: |
          {
            echo "### Backup restore test"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Backup | \`${BACKUP_KEY:-unresolved}\` |"
            echo "| Restored tables | ${RESTORED_TABLES:-0} |"
            echo "| Migration head | ${MIGRATION_HEAD:-unknown} |"
            echo "| Tenants | ${TENANT_COUNT:-0} |"
            echo "| Duration | ${RESTORE_SECONDS:-0}s |"
            echo ""
            echo "Restored into a throwaway Postgres service container. Production was never connected to."
          } >> "$GITHUB_STEP_SUMMARY"
