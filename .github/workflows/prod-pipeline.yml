name: Production Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'database-scripts/**'
      - 'Dockerfile.migrate'
      - 'src/**'
      - 'protos/**'
      - 'Dockerfile'
      - 'svyneEventBackEnd.slnx'
  workflow_dispatch:

concurrency:
  group: prod-pipeline
  cancel-in-progress: false

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      db: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.db == 'true' }}
      backend: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.backend == 'true' }}
    steps:
      - name: Checkout Code
        if: github.event_name == 'push'
        uses: actions/checkout@v5

      - name: Detect changed areas
        if: github.event_name == 'push'
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            db:
              - 'database-scripts/**'
              - 'Dockerfile.migrate'
            backend:
              - 'src/**'
              - 'protos/**'
              - 'Dockerfile'
              - 'svyneEventBackEnd.slnx'

  migrate-prod:
    needs: changes
    if: needs.changes.outputs.db == 'true'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Validate migrations compile
        run: docker build -f Dockerfile.migrate -t migrate-runner .

      - name: Validate no unguarded destructive SQL
        run: |
          # DROP TABLE / TRUNCATE in sql/ business-logic files is never expected;
          # DDL drops belong in reviewed EF migrations only.
          if grep -rniE 'DROP TABLE|TRUNCATE ' database-scripts/sql/; then
            echo "::error::Destructive statement found in database-scripts/sql/ — move it to a reviewed EF migration."
            exit 1
          fi
          echo "No destructive statements in sql/."

      - name: Install postgres client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-common
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-17
          # The postgresql-common wrapper keeps resolving pg_dump to the
          # preinstalled v16 client, so put the 17 binaries first on PATH
          # for every following step.
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"
          /usr/lib/postgresql/17/bin/pg_dump --version

      - name: Backup database
        env:
          PGPASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          pg_dump "host=${{ secrets.DB_HOST }} port=${{ secrets.DB_PORT_SESSION }} dbname=${{ secrets.DB_NAME }} user=${{ secrets.DB_USER }} sslmode=require" \
            --format=custom --no-owner \
            --file="pre-migration-${GITHUB_SHA::8}.dump"
          ls -lh pre-migration-*.dump

      - name: Upload backup artifact
        uses: actions/upload-artifact@v7
        with:
          name: pre-migration-backup-${{ github.sha }}
          path: pre-migration-*.dump
          retention-days: 7

      - name: Run Schema Migrations
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT_SESSION: ${{ secrets.DB_PORT_SESSION }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          CONN_STRING="Host=${DB_HOST};Port=${DB_PORT_SESSION};Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD};SslMode=Require;Trust Server Certificate=true;"
          docker run --rm -e MIGRATION_DATABASE_URL="$CONN_STRING" migrate-runner

      - name: Verify database health
        env:
          PGPASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          CONN="host=${{ secrets.DB_HOST }} port=${{ secrets.DB_PORT_SESSION }} dbname=${{ secrets.DB_NAME }} user=${{ secrets.DB_USER }} sslmode=require"

          echo "== migration history head =="
          psql "$CONN" -tAc 'SELECT migration_id FROM "__EFMigrationsHistory" ORDER BY migration_id DESC LIMIT 1'

          echo "== RLS audit: tables missing RLS outside allowlist =="
          VIOLATIONS=$(psql "$CONN" -tAc "
            SELECT string_agg(tablename, ', ')
            FROM pg_tables
            WHERE schemaname='public' AND rowsecurity=false
              AND tablename NOT IN ('__EFMigrationsHistory','addresses','tax_rate_cache');")
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::Tables without RLS after migration: $VIOLATIONS"
            exit 1
          fi
          echo "RLS intact."

          echo "== critical objects exist =="
          psql "$CONN" -v ON_ERROR_STOP=1 -tAc "
            DO \$\$
            BEGIN
              IF NOT EXISTS (SELECT 1 FROM pg_proc WHERE proname='sp_public_tenant_identity') THEN
                RAISE EXCEPTION 'sp_public_tenant_identity missing';
              END IF;
              IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE tablename='tenants' AND policyname='p_tenant_isolation') THEN
                RAISE EXCEPTION 'tenants RLS policy missing';
              END IF;
            END \$\$;"
          echo "All post-migration checks passed."

  deploy-prod:
    needs: [changes, migrate-prod]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.backend == 'true' && vars.AUTO_DEPLOY_RENDER == 'true' }}
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Check Render credentials
        run: |
          if [ -z "${{ secrets.RENDER_SERVICE_ID }}" ] || [ -z "${{ secrets.RENDER_API_KEY }}" ]; then
            echo "::notice::Render keys are missing — set RENDER_SERVICE_ID and RENDER_API_KEY secrets to enable deploy."
            echo "SKIP_DEPLOY=true" >> "$GITHUB_ENV"
          fi

      - name: Trigger Render deploy
        if: env.SKIP_DEPLOY != 'true'
        run: |
          DEPLOY_ID=$(curl -fsS -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" -d '{}' | jq -r '.id')
          if [ -z "$DEPLOY_ID" ] || [ "$DEPLOY_ID" = "null" ]; then
            echo "::error::Render deploy trigger returned no deploy id"
            exit 1
          fi
          echo "DEPLOY_ID=$DEPLOY_ID" >> "$GITHUB_ENV"

      - name: Wait for deploy to go live
        if: env.SKIP_DEPLOY != 'true'
        run: |
          for i in $(seq 1 80); do
            STATUS=$(curl -fsS \
              "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys/${DEPLOY_ID}" \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" | jq -r '.status')
            echo "deploy status: $STATUS"
            case "$STATUS" in
              live) exit 0 ;;
              build_failed|update_failed|canceled|deactivated)
                echo "::error::Render deploy ended with status $STATUS"
                exit 1 ;;
            esac
            sleep 15
          done
          echo "::error::Timed out waiting for Render deploy to go live"
          exit 1

      - name: Smoke check ListPublicTenants
        if: env.SKIP_DEPLOY != 'true'
        run: |
          printf '\x00\x00\x00\x00\x00' > empty.bin
          HEADERS=$(curl -fsS -D - -o /dev/null -X POST \
            "https://svyne-backend.onrender.com/svyne.tenant.TenantService/ListPublicTenants" \
            -H "Content-Type: application/grpc-web+proto" \
            --data-binary @empty.bin)
          echo "$HEADERS"
          if echo "$HEADERS" | grep -i '^grpc-status:' | grep -vq ': 0'; then
            echo "::error::ListPublicTenants returned a non-OK grpc-status"
            exit 1
          fi
