syntax = "proto3";

package svyne.auth;

option csharp_namespace = "Svyne.Protos.Auth";

import "common.proto";

service AuthService {
  rpc Login (LoginRequest) returns (AuthResponse);
  rpc SignUp (SignUpRequest) returns (AuthResponse);
  rpc GoogleSignIn (GoogleSignInRequest) returns (AuthResponse);
  rpc RefreshToken (RefreshTokenRequest) returns (AuthResponse);
  rpc Logout (LogoutRequest) returns (svyne.common.AckResponse);
  rpc RequestMagicLink (MagicLinkRequest) returns (svyne.common.AckResponse);
  rpc VerifyMagicLink (MagicLinkVerifyRequest) returns (AuthResponse);
  rpc RequestPasswordReset (PasswordResetRequest) returns (svyne.common.AckResponse);
  rpc SetPassword (SetPasswordRequest) returns (svyne.common.AckResponse);
  rpc Me (svyne.common.Empty) returns (UserProfile);
  rpc UpdateProfile (UpdateProfileRequest) returns (UserProfile);
  rpc SetAvatar (SetAvatarRequest) returns (UserProfile);
}

message UpdateProfileRequest {
  string first_name = 1;
  string last_name = 2;
  string phone = 3;
  string address_line = 4;
  string city = 5;
  string state = 6;
  string zip = 7;
}

message SetAvatarRequest {
  string images_id = 1;
}

message LoginRequest {
  string email = 1;
  string password = 2;
  string tenant_slug = 3;
  // Portal the login originates from: "public" | "admin" | "staff" | "developer".
  // Login is rejected if the account's role is not allowed in that portal.
  string portal = 4;
}

message SignUpRequest {
  string email = 1;
  string password = 2;
  string first_name = 3;
  string last_name = 4;
  string tenant_slug = 5;
}

message GoogleSignInRequest {
  string google_token = 1;
  string tenant_slug = 2;
  // See LoginRequest.portal.
  string portal = 3;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message LogoutRequest {
  string session_hash = 1;
}

message MagicLinkRequest {
  string email = 1;
  string tenant_slug = 2;
}

message MagicLinkVerifyRequest {
  string token = 1;
}

message PasswordResetRequest {
  string email = 1;
  string tenant_slug = 2;
  // Origin of the portal the request came from (e.g. http://admin.localhost:5173).
  // The reset link is built on this host so it returns to the same portal.
  string origin = 3;
}

message SetPasswordRequest {
  string token = 1;
  string new_password = 2;
}

message AuthResponse {
  string access_token = 1;
  string refresh_token = 2;
  int64 expires_at = 3;
  UserProfile user = 4;
}

message UserProfile {
  string users_id = 1;
  string tenants_id = 2;
  string email = 3;
  string first_name = 4;
  string last_name = 5;
  int32 role = 6;
  string tenant_slug = 7;
  bool email_verified = 8;
  string avatar_url = 9;
  string phone = 10;
  string address_line = 11;
  string city = 12;
  string state = 13;
  string zip = 14;
}
