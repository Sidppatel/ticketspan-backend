syntax = "proto3";

package svyne.booking;

option csharp_namespace = "Svyne.Protos.Booking";

import "common.proto";

service TableBookingService {
  rpc GetEventLayout (svyne.common.UuidValue) returns (EventLayout);
  rpc SaveEventLayout (SaveEventLayoutRequest) returns (svyne.common.AckResponse);
  rpc LockTable (LockTableRequest) returns (svyne.common.AckResponse);
  rpc ReleaseTableLock (LockTableRequest) returns (svyne.common.AckResponse);
  rpc ListTablesForEvent (svyne.common.UuidValue) returns (ListTablesResponse);
  rpc ListEventTableTypes (svyne.common.UuidValue) returns (ListEventTableTypesResponse);
  rpc CreateEventTable (CreateEventTableRequest) returns (svyne.common.UuidValue);
  rpc DeleteEventTable (svyne.common.UuidValue) returns (svyne.common.AckResponse);
  rpc CreateEventTicketType (CreateEventTicketTypeRequest) returns (svyne.common.UuidValue);
  rpc UpdateEventTicketType (UpdateEventTicketTypeRequest) returns (svyne.common.AckResponse);
  rpc DeleteEventTicketType (svyne.common.UuidValue) returns (svyne.common.AckResponse);
  // Catalog table-type price rules: reusable presale/last-minute rules attached to
  // a table template and snapshotted onto event prices when a table type is created
  // from that template.
  rpc CreateTableTemplatePriceRule (CreateTableTemplatePriceRuleRequest) returns (svyne.common.UuidValue);
  rpc ListTableTemplatePriceRules (svyne.common.UuidValue) returns (ListTableTemplatePriceRulesResponse);
  rpc DeleteTableTemplatePriceRule (svyne.common.UuidValue) returns (svyne.common.AckResponse);
  // Catalog table-type templates (tenant-scoped, reusable across events).
  rpc ListTableTemplates (svyne.common.Empty) returns (ListTableTemplatesResponse);
  rpc CreateTableTemplate (CreateTableTemplateRequest) returns (svyne.common.UuidValue);
  rpc UpdateTableTemplate (UpdateTableTemplateRequest) returns (svyne.common.AckResponse);
  rpc DeleteTableTemplate (svyne.common.UuidValue) returns (svyne.common.AckResponse);
}

message Table {
  string tables_id = 1;
  string event_tables_id = 2;
  string label = 3;
  double pos_x = 4;
  double pos_y = 5;
  double width = 6;
  double height = 7;
  string status = 8;
  int32 price_cents = 9;
  int32 platform_fee_cents = 10;
  string fee_formulas_id = 11;
  // Per-individual-table overrides of the parent event_table type (empty/0 = inherit).
  string shape_override = 12;
  string color_override = 13;
  int32 capacity_override = 14;
  // Linked Pricing Module price (authoritative). Empty = legacy cached price.
  string prices_id = 15;
}

// A non-table object placed on the floor-plan canvas (Entry/Exit/Stage).
message LayoutObject {
  string layout_objects_id = 1;
  string object_type = 2;
  string label = 3;
  double pos_x = 4;
  double pos_y = 5;
  double width = 6;
  double height = 7;
  string color = 8;
  int32 sort_order = 9;
}

message EventLayout {
  string events_id = 1;
  repeated Table tables = 4;
  repeated LayoutObject objects = 5;
}

message SaveEventLayoutRequest {
  string events_id = 1;
  string tables_json = 4;
  repeated string locked_ids = 5;
  // JSON array of layout objects (Entry/Exit/Stage) to upsert/delete.
  string objects_json = 6;
}

message LockTableRequest {
  string tables_id = 1;
}

message ListTablesResponse {
  repeated Table tables = 1;
}

// A table TYPE (event_tables) used as a palette item in the floor-plan builder.
message EventTableType {
  string event_tables_id = 1;
  string label = 2;
  int32 capacity = 3;
  string shape = 4;
  string color = 5;
  int32 price_cents = 6;
  string prices_id = 7;
  // Default pixel footprint used when placing this type on the floor plan.
  double default_width = 8;
  double default_height = 9;
}

message ListEventTableTypesResponse {
  repeated EventTableType table_types = 1;
}

message CreateEventTableRequest {
  string events_id = 1;
  string label = 2;
  int32 capacity = 3;
  string shape = 4;
  string color = 5;
  int32 price_cents = 6;
  string fee_formulas_id = 7;
  string table_templates_id = 8;
  // Table pricing mode for the linked Price. Default (is_all_inclusive=true):
  // the price_cents covers the whole table. When false, price_cents is the table
  // base and per_attendee_cents is added per reserved seat.
  bool is_all_inclusive = 9;
  int32 per_attendee_cents = 10;
  // Pixel footprint override (0 = inherit the catalog template default).
  double width = 11;
  double height = 12;
}

message CreateEventTicketTypeRequest {
  string events_id = 1;
  string label = 2;
  int32 price_cents = 3;
  string fee_formulas_id = 4;
  int32 max_quantity = 5;
  int32 sort_order = 6;
  string description = 7;
  int32 capacity = 8;                 // seats this tier contributes to event capacity (0 = uncapped)
}

message UpdateEventTicketTypeRequest {
  string event_ticket_types_id = 1;
  string label = 2;
  int32 price_cents = 3;
  string fee_formulas_id = 4;
  int32 max_quantity = 5;
  int32 sort_order = 6;
  string description = 7;
  bool is_active = 8;
  int32 capacity = 9;                 // seats this tier contributes to event capacity (0 = uncapped)
}

// A catalog price rule on a table template (mirrors pricing.PriceRule, keyed by
// table_templates_id instead of prices_id).
message TableTemplatePriceRule {
  string table_template_price_rules_id = 1;
  string table_templates_id = 2;
  string name = 3;
  string rule_type = 4;       // Presale | LastMinute | TimeWindow | Dynamic
  int32 priority = 5;         // higher wins
  int32 price_cents = 6;
  int64 active_from = 7;      // unix seconds; 0 = unset
  int64 active_until = 8;     // unix seconds; 0 = unset
  int32 min_remaining = 9;    // -1 = unset
  int32 max_remaining = 10;   // -1 = unset
  bool is_active = 11;
}

message CreateTableTemplatePriceRuleRequest {
  string table_templates_id = 1;
  string name = 2;
  string rule_type = 3;
  int32 priority = 4;
  int32 price_cents = 5;
  int64 active_from = 6;
  int64 active_until = 7;
  int32 min_remaining = 8;
  int32 max_remaining = 9;
}

message ListTableTemplatePriceRulesResponse {
  repeated TableTemplatePriceRule rules = 1;
}

message TableTemplate {
  string table_templates_id = 1;
  string name = 2;
  int32 default_capacity = 3;
  string default_shape = 4;
  string default_color = 5;
  int32 default_price_cents = 6;
  bool is_active = 7;
  double default_width = 8;
  double default_height = 9;
  // When true the price covers everyone at the table; when false it is the
  // per-attendee price. Snapshotted onto event prices at table-create time.
  bool default_is_all_inclusive = 10;
}

message CreateTableTemplateRequest {
  string name = 1;
  int32 default_capacity = 2;
  string default_shape = 3;
  string default_color = 4;
  int32 default_price_cents = 5;
  double default_width = 6;
  double default_height = 7;
  bool default_is_all_inclusive = 8;
}

// Edit a catalog table type. Name is intentionally absent: it is locked after
// creation. is_active drives the enable/disable toggle.
message UpdateTableTemplateRequest {
  string table_templates_id = 1;
  int32 default_capacity = 2;
  string default_shape = 3;
  string default_color = 4;
  int32 default_price_cents = 5;
  double default_width = 6;
  double default_height = 7;
  bool default_is_all_inclusive = 8;
  bool is_active = 9;
}

message ListTableTemplatesResponse {
  repeated TableTemplate templates = 1;
}
