syntax = "proto3";

package ticketspan.booking;

option csharp_namespace = "TicketSpan.Protos.Booking";

import "common.proto";
import "pricing.proto";

service BookingService {
  rpc ListEventTicketTypes (ticketspan.common.UuidValue) returns (ListEventTicketTypesResponse);
  rpc CreateBooking (CreateBookingRequest) returns (CreateBookingResponse);
  rpc ReserveOpenCapacity (ReserveOpenCapacityRequest) returns (CreateBookingResponse);
  // Cart checkout: one booking aggregating many ticket/table lines, one payment.
  rpc CreateMultiBooking (CreateMultiBookingRequest) returns (CreateBookingResponse);
  // Preview a cart's full pricing breakdown WITHOUT reserving anything. Same engine
  // as checkout (app.price_breakdown), so the customer checkout page and admin
  // multi-item preview render identical numbers.
  rpc QuoteCart (CreateMultiBookingRequest) returns (CartQuote);
  rpc CreatePaymentIntent (PaymentIntentRequest) returns (PaymentIntentResponse);
  // Re-price the booking for the chosen method (card/ach) and update the Stripe
  // intent amount server-side. Returns the new total + ACH savings.
  rpc UpdatePaymentIntentForMethod (UpdatePaymentMethodRequest) returns (UpdatePaymentMethodResponse);
  rpc GetPaymentStatus (ticketspan.common.UuidValue) returns (PaymentStatusResponse);
  rpc ConfirmBooking (ConfirmBookingRequest) returns (ticketspan.common.AckResponse);
  rpc CancelBooking (ticketspan.common.UuidValue) returns (ticketspan.common.AckResponse);
  rpc RefundBooking (ticketspan.common.UuidValue) returns (ticketspan.common.AckResponse);
  rpc GetBooking (ticketspan.common.UuidValue) returns (Booking);
  rpc ListBookings (ListBookingsRequest) returns (ListBookingsResponse);
  rpc GetBookingStats (ticketspan.common.UuidValue) returns (BookingStats);
}

service TicketService {
  rpc GetTicket (ticketspan.common.UuidValue) returns (Ticket);
  rpc ClaimTicket (ClaimTicketRequest) returns (ticketspan.common.AckResponse);
  rpc InviteTicket (InviteTicketRequest) returns (ticketspan.common.AckResponse);
  rpc ListTickets (ticketspan.common.UuidValue) returns (ListTicketsResponse);
  rpc ClaimTicketSelf (ticketspan.common.UuidValue) returns (ticketspan.common.AckResponse);
  rpc RevokeTicket (ticketspan.common.UuidValue) returns (ticketspan.common.AckResponse);
  rpc ListMyTickets (ticketspan.common.Empty) returns (ListTicketsResponse);
}

service CheckInService {
  rpc Scan (ScanRequest) returns (ScanResponse);
  rpc GetCheckInStats (ticketspan.common.UuidValue) returns (CheckInStats);
  rpc ListEventsForStaff (ticketspan.common.Empty) returns (ListEventsForStaffResponse);
  rpc GetGuestList (ticketspan.common.UuidValue) returns (GetGuestListResponse);
  rpc CheckInGuest (CheckInGuestRequest) returns (ScanResponse);
  rpc ListCheckInLogs (ListCheckInLogsRequest) returns (ListCheckInLogsResponse);
}

message Booking {
  string bookings_id = 1;
  string tenants_id = 2;
  string booking_number = 3;
  string status = 4;
  string users_id = 5;
  string events_id = 6;
  int32 subtotal_cents = 7;
  int32 fee_cents = 8;
  int32 total_cents = 9;
  int32 seats_reserved = 10;
  // Cart lines (empty for single-line legacy bookings).
  repeated BookingLine lines = 11;
  string event_title = 12;
  string event_slug = 13;
  int64 event_start_date = 14;
  int32 tickets_total = 15;
  // Tickets on this booking with status Claimed or CheckedIn.
  int32 tickets_claimed = 16;
  string payment_transaction_id = 17;
  bool fees_included = 18;
  string venue_name = 19;
  string venue_address = 20;
  int64 paid_at = 21;
  int32 tax_cents = 22;
  int32 service_fee_cents = 23;
  string venue_zip = 24;
  string venue_city = 25;
  string venue_state = 26;
  string payment_method_type = 27;
  string payment_method_last4 = 28;
}

// One line of a booking, for display on checkout / booking detail. Carries the
// immutable pricing snapshot captured at purchase so historical bookings always
// show the original price even after rules/prices change.
message BookingLine {
  string booking_lines_id = 1;
  string kind = 2;            // Ticket | Table
  string label = 3;          // tier label or table label
  string event_ticket_types_id = 4;
  string tables_id = 5;
  int32 seats = 6;
  int32 subtotal_cents = 7;   // = selling
  int32 fee_cents = 8;        // = platform + gateway + tax
  int32 total_cents = 9;      // = final
  int32 base_price_cents = 10;
  int32 selling_price_cents = 11;
  int32 discount_cents = 12;
  string applied_rule_name = 13;   // empty = no rule
  int32 platform_fee_cents = 14;
  int32 gateway_fee_cents = 15;
  int32 tax_cents = 16;
  int32 final_price_cents = 17;
  string currency = 18;
}

message CreateMultiBookingRequest {
  string events_id = 1;
  repeated BookingLineInput lines = 2;
}

// One previewed cart line: the sellable identity + its full breakdown.
message CartQuoteLine {
  string kind = 1;            // Ticket | Table
  string ref_id = 2;          // event_ticket_types_id (Ticket) or tables_id (Table)
  string label = 3;
  int32 seats = 4;
  ticketspan.pricing.PriceBreakdown breakdown = 5;
}

// A non-reserving preview of an entire cart: per-line breakdowns + summed totals.
message CartQuote {
  repeated CartQuoteLine lines = 1;
  int32 base_total_cents = 2;        // sum of line base prices (pre-discount)
  int32 subtotal_cents = 3;          // sum of selling prices
  int32 discount_cents = 4;          // base_total - subtotal
  int32 platform_fee_cents = 5;
  int32 gateway_fee_cents = 6;
  int32 tax_cents = 7;
  int32 fee_cents = 8;               // platform + gateway + tax
  int32 total_cents = 9;             // final amount the customer pays
  int32 organizer_net_cents = 10;
  string currency = 11;
  // Cart hold window in seconds, from app_settings.booking_hold_seconds.
  int32 hold_seconds = 12;
  // ACH (bank) checkout: offered for this event, the discounted bank total, and
  // what the buyer saves vs the card total. ach_available=false → the other two are 0.
  bool ach_available = 13;
  int32 ach_total_cents = 14;
  int32 ach_savings_cents = 15;
}

message BookingLineInput {
  string kind = 1;            // Ticket | Table
  string ref_id = 2;         // event_ticket_types_id (Ticket) or tables_id (Table)
  int32 seats = 3;           // ticket quantity; ignored for tables (= capacity)
}

message CreateBookingRequest {
  string events_id = 1;
  string tables_id = 2;
  int32 seats = 3;
  string event_ticket_types_id = 4;
  int32 subtotal_cents = 5;
  int32 fee_cents = 6;
  int32 total_cents = 7;
}

message ReserveOpenCapacityRequest {
  string events_id = 1;
  int32 seats = 2;
  string event_ticket_types_id = 3;
  int32 subtotal_cents = 4;
  int32 fee_cents = 5;
  int32 total_cents = 6;
}

message CreateBookingResponse {
  string bookings_id = 1;
  string booking_number = 2;
}

message EventTicketType {
  string event_ticket_types_id = 1;
  string label = 2;
  int32 price_cents = 3;
  int32 platform_fee_cents = 4;
  int32 max_quantity = 5;
  string description = 6;
  string fee_formulas_id = 7;
  int32 capacity = 8;                 // seats this tier contributes to event capacity (0 = uncapped)
  // Current selling price after active price rules (equals price_cents when no
  // discount applies). Display hint; QuoteCart is authoritative at booking time.
  int32 selling_price_cents = 9;
  int32 sold_count = 10;
  int32 service_fee_cents = 11;
  int32 tax_cents = 12;
  int32 total_cents = 13;
}

message ListEventTicketTypesResponse {
  repeated EventTicketType ticket_types = 1;
}

message PaymentIntentRequest {
  string bookings_id = 1;
  // "ach" opens a bank-only intent priced at the ACH fee; anything else (default)
  // = the normal card/wallets intent. Ignored when the event isn't ACH-enabled.
  string preferred_method = 2;
}

message PaymentIntentResponse {
  string client_secret = 1;
  string publishable_key = 2;
  string payment_intent_id = 3;
  string status = 4;
  int64 amount_cents = 5;
  // Unix seconds when the seat hold expires (0 = no hold).
  int64 hold_expires_at = 6;
  // True when this booking's event offers ACH — the UI may show the bank option
  // and re-price via UpdatePaymentIntentForMethod when the buyer picks it.
  bool ach_allowed = 7;
}

message UpdatePaymentMethodRequest {
  string bookings_id = 1;
  string method = 2;          // "card" | "ach"
}

message UpdatePaymentMethodResponse {
  int32 total_cents = 1;      // new amount the buyer will be charged
  int32 savings_cents = 2;    // card total - this total (0 for card)
}

message PaymentStatusResponse {
  // Booking lifecycle: Pending|Paid|Cancelled|Refunded|Expired.
  string booking_status = 1;
  // Stripe payment: RequiresConfirmation|Succeeded|Failed|Refunded.
  string payment_status = 2;
}

message ConfirmBookingRequest {
  string bookings_id = 1;
  string qr_token = 2;
}

message ListBookingsRequest {
  ticketspan.common.PageRequest page = 1;
  string events_id = 2;
  string status = 3;
}

message ListBookingsResponse {
  repeated Booking bookings = 1;
  ticketspan.common.PageMeta meta = 2;
}

message BookingStats {
  int32 total = 1;
  int32 paid = 2;
  int32 checked_in = 3;
  int64 revenue_cents = 4;
}

message Ticket {
  string tickets_id = 1;
  string ticket_code = 2;
  string qr_token = 3;
  int32 seat_number = 4;
  string status = 5;
  string guest_users_id = 6;
  string event_title = 7;
  int64 event_start_date = 8;
  string venue_name = 9;
  string event_slug = 10;
  string booking_number = 11;
  string ticket_type_label = 12;
  string invited_email = 13;
  int64 invite_sent_at = 14;
}

message ClaimTicketRequest {
  string token = 1;
}

message InviteTicketRequest {
  string tickets_id = 1;
  string email = 2;
}

message ListTicketsResponse {
  repeated Ticket tickets = 1;
}

message ScanRequest {
  string qr_token = 1;
  string events_id = 2;
}

message ScanResponse {
  bool valid = 1;
  string status = 2;
  string holder_name = 3;
  string message = 4;
}

message CheckInStats {
  int32 total = 1;
  int32 checked_in = 2;
  int32 remaining = 3;
}

message ListCheckInLogsRequest {
  string events_id = 1;
  string staff_user_id = 2;
  string method = 3;
  string status = 4;
  int32 page = 5;
  int32 page_size = 6;
}

message CheckInLogEntry {
  string checkin_logs_id = 1;
  string staff_name = 2;
  string attendee_name = 3;
  string booking_number = 4;
  string ticket_code = 5;
  string ticket_type_label = 6;
  int64 timestamp = 7;
  string method = 8;
  string status = 9;
  string failure_reason = 10;
}

message ListCheckInLogsResponse {
  repeated CheckInLogEntry logs = 1;
  int32 total_count = 2;
}

message StaffEvent {
  string events_id = 1;
  string title = 2;
  string slug = 3;
  int64 start_date = 4;
  int64 end_date = 5;
  string status = 6;
  string venue_name = 7;
}

message ListEventsForStaffResponse {
  repeated StaffEvent events = 1;
}

message GuestTicket {
  string tickets_id = 1;
  string ticket_code = 2;
  string guest_name = 3;
  string status = 4;
  int32 seat_number = 5;
  int64 checked_in_at = 6;
}

message GuestBooking {
  string bookings_id = 1;
  string booking_number = 2;
  string buyer_name = 3;
  string status = 4;
  repeated GuestTicket tickets = 5;
}

message GetGuestListResponse {
  repeated GuestBooking bookings = 1;
}

message CheckInGuestRequest {
  string events_id = 1;
  string code_or_id = 2;
  string type = 3;
}
