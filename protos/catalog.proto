syntax = "proto3";

package ticketspan.catalog;

option csharp_namespace = "TicketSpan.Protos.Catalog";

import "common.proto";

service VenueService {
  rpc CreateVenue (CreateVenueRequest) returns (ticketspan.common.UuidValue);
  rpc UpdateVenue (UpdateVenueRequest) returns (ticketspan.common.AckResponse);
  rpc GetVenue (ticketspan.common.UuidValue) returns (Venue);
  rpc ListVenues (ticketspan.common.PageRequest) returns (ListVenuesResponse);
  rpc ListVenueImages (ticketspan.common.UuidValue) returns (ListVenueImagesResponse);
  rpc AddVenueImage (AddVenueImageRequest) returns (VenueImage);
  rpc RemoveVenueImage (RemoveVenueImageRequest) returns (ticketspan.common.AckResponse);
  rpc SetPrimaryVenueImage (RemoveVenueImageRequest) returns (ticketspan.common.AckResponse);
  rpc ReorderVenueImages (ReorderVenueImagesRequest) returns (ticketspan.common.AckResponse);
}

service PerformerService {
  rpc CreatePerformer (CreatePerformerRequest) returns (ticketspan.common.UuidValue);
  rpc UpdatePerformer (UpdatePerformerRequest) returns (ticketspan.common.AckResponse);
  rpc DeletePerformer (ticketspan.common.UuidValue) returns (ticketspan.common.AckResponse);
  rpc ListPerformers (ticketspan.common.PageRequest) returns (ListPerformersResponse);
  rpc SetEventPerformers (SetEventLinksRequest) returns (ticketspan.common.AckResponse);
  rpc GetPerformerBySlug (GetBySlugRequest) returns (PublicPerformer);
}

service SponsorService {
  rpc CreateSponsor (CreateSponsorRequest) returns (ticketspan.common.UuidValue);
  rpc UpdateSponsor (UpdateSponsorRequest) returns (ticketspan.common.AckResponse);
  rpc DeleteSponsor (ticketspan.common.UuidValue) returns (ticketspan.common.AckResponse);
  rpc ListSponsors (ticketspan.common.PageRequest) returns (ListSponsorsResponse);
  rpc SetEventSponsors (SetEventLinksRequest) returns (ticketspan.common.AckResponse);
  rpc GetSponsorBySlug (GetBySlugRequest) returns (PublicSponsor);
}

message GetBySlugRequest {
  string slug = 1;
}

message PublicLinkedEvent {
  string events_id = 1;
  string title = 2;
  string slug = 3;
  int64 start_date = 4;
  string primary_image_path = 5;
  string category = 6;
}

message PublicPerformer {
  string performers_id = 1;
  string name = 2;
  string slug = 3;
  string primary_image_path = 4;
  string meta_json = 5;
  repeated PublicLinkedEvent events = 6;
}

message PublicSponsor {
  string sponsors_id = 1;
  string name = 2;
  string slug = 3;
  string primary_image_path = 4;
  string meta_json = 5;
  repeated PublicLinkedEvent events = 6;
}

message Venue {
  string venues_id = 1;
  string name = 2;
  string description = 3;
  string image_path = 4;
  string phone = 5;
  string email = 6;
  string website = 7;
  bool is_active = 8;
  string state = 9;
  string line1 = 10;
  string line2 = 11;
  string city = 12;
  string zip = 13;
  double state_tax_rate = 14;
  double county_tax_rate = 15;
  double city_tax_rate = 16;
  double local_tax_rate = 17;
  double combined_tax_rate = 18;
}

message CreateVenueRequest {
  string name = 1;
  string description = 2;
  string image_path = 3;
  string phone = 4;
  string email = 5;
  string website = 6;
  string line1 = 7;
  string line2 = 8;
  string city = 9;
  string state = 10;
  string zip = 11;
}

message UpdateVenueRequest {
  string venues_id = 1;
  string name = 2;
  string description = 3;
  string phone = 4;
  string email = 5;
  string website = 6;
  string line1 = 7;
  string line2 = 8;
  string city = 9;
  string state = 10;
  string zip = 11;
  bool is_active = 14;
}

message ListVenuesResponse {
  repeated Venue venues = 1;
  ticketspan.common.PageMeta meta = 2;
}

message VenueImage {
  string images_id = 1;
  string storage_key = 2;
  bool is_primary = 3;
  int32 sort_order = 4;
}

message ListVenueImagesResponse {
  repeated VenueImage images = 1;
}

message AddVenueImageRequest {
  string venues_id = 1;
  string images_id = 2;
}

message RemoveVenueImageRequest {
  string venues_id = 1;
  string images_id = 2;
}

message ReorderVenueImagesRequest {
  string venues_id = 1;
  repeated string images_id = 2;
}

message Performer {
  string performers_id = 1;
  string name = 2;
  string slug = 3;
  string primary_image_path = 4;
  string meta_json = 5;
  bool is_active = 6;
}

message CreatePerformerRequest {
  string name = 1;
  string slug = 2;
  string image_path = 3;
  string meta_json = 4;
  bool is_active = 5;
}

message UpdatePerformerRequest {
  string performers_id = 1;
  string name = 2;
  string image_path = 3;
  string meta_json = 4;
  bool is_active = 5;
}

message ListPerformersResponse {
  repeated Performer performers = 1;
  ticketspan.common.PageMeta meta = 2;
}

message Sponsor {
  string sponsors_id = 1;
  string name = 2;
  string slug = 3;
  string primary_image_path = 4;
  string meta_json = 5;
  bool is_active = 6;
}

message CreateSponsorRequest {
  string name = 1;
  string slug = 2;
  string image_path = 3;
  string meta_json = 4;
  bool is_active = 5;
}

message UpdateSponsorRequest {
  string sponsors_id = 1;
  string name = 2;
  string image_path = 3;
  string meta_json = 4;
  bool is_active = 5;
}

message ListSponsorsResponse {
  repeated Sponsor sponsors = 1;
  ticketspan.common.PageMeta meta = 2;
}

message SetEventLinksRequest {
  string events_id = 1;
  string links_json = 2;
}
