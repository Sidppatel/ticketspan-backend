syntax = "proto3";

package svyne.common;

option csharp_namespace = "Svyne.Protos.Common";

message AckResponse {
  bool success = 1;
  string message = 2;
  int32 code = 3;
}

message Empty {}

message PageRequest {
  int32 offset = 1;
  int32 limit = 2;
  string search = 3;
}

message PageMeta {
  int32 total = 1;
  int32 offset = 2;
  int32 limit = 3;
}

message UuidValue {
  string value = 1;
}
