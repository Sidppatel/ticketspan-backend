syntax = "proto3";

package ticketspan.event;

option csharp_namespace = "TicketSpan.Protos.Event";

import "common.proto";

service EventService {
  rpc CreateEvent (CreateEventRequest) returns (CreateEventResponse);
  rpc UpdateEvent (UpdateEventRequest) returns (ticketspan.common.AckResponse);
  rpc DeleteEvent (ticketspan.common.UuidValue) returns (ticketspan.common.AckResponse);
  rpc GetEvent (ticketspan.common.UuidValue) returns (Event);
  rpc GetEventBySlug (GetEventBySlugRequest) returns (Event);
  rpc ListEvents (ListEventsRequest) returns (ListEventsResponse);
  rpc SearchEvents (SearchEventsRequest) returns (ListEventsResponse);
  rpc ChangeEventStatus (ChangeEventStatusRequest) returns (ticketspan.common.AckResponse);
  rpc GetEventStats (ticketspan.common.UuidValue) returns (EventStats);
  rpc SetEventFeesIncluded (SetEventFeesIncludedRequest) returns (ticketspan.common.AckResponse);
  // Admin opt-in to offering ACH at checkout (only sticks if the tenant is ACH-enabled).
  rpc SetEventAch (SetEventAchRequest) returns (ticketspan.common.AckResponse);
  rpc ListScheduleItems (ticketspan.common.UuidValue) returns (ListScheduleItemsResponse);
  rpc CreateScheduleItem (CreateScheduleItemRequest) returns (ticketspan.common.UuidValue);
  rpc UpdateScheduleItem (UpdateScheduleItemRequest) returns (ticketspan.common.AckResponse);
  rpc DeleteScheduleItem (ticketspan.common.UuidValue) returns (ticketspan.common.AckResponse);
  rpc ListEventImages (ListEventImagesRequest) returns (ListEventImagesResponse);
  rpc AddEventImage (AddEventImageRequest) returns (EventImage);
  rpc RemoveEventImage (RemoveEventImageRequest) returns (ticketspan.common.AckResponse);
  rpc SetPrimaryEventImage (RemoveEventImageRequest) returns (ticketspan.common.AckResponse);
  rpc ReorderEventImages (ReorderEventImagesRequest) returns (ticketspan.common.AckResponse);
  rpc GetMediaSettings (ticketspan.common.Empty) returns (MediaSettings);
  rpc GenerateEventInfo (GenerateEventInfoRequest) returns (GenerateEventInfoResponse);
  rpc GetAiSettings (ticketspan.common.Empty) returns (AiSettingsResponse);
}

message EventImage {
  string images_id = 1;
  string storage_key = 2;
  string type = 3;
  bool is_primary = 4;
  int32 sort_order = 5;
}

message ListEventImagesRequest {
  string events_id = 1;
  string type = 2;
}

message ListEventImagesResponse {
  repeated EventImage images = 1;
}

message AddEventImageRequest {
  string events_id = 1;
  string images_id = 2;
  string type = 3;
}

message RemoveEventImageRequest {
  string events_id = 1;
  string images_id = 2;
}

message ReorderEventImagesRequest {
  string events_id = 1;
  string type = 2;
  repeated string images_id = 3;
}

message MediaSettings {
  string event_image_aspect_ratio = 1;
  string event_thumbnail_aspect_ratio = 2;
}

message ScheduleItem {
  string schedule_items_id = 1;
  string events_id = 2;
  string title = 3;
  string type_category = 4;
  int64 start_time = 5;
  int64 end_time = 6;
}

message ListScheduleItemsResponse {
  repeated ScheduleItem items = 1;
}

message CreateScheduleItemRequest {
  string events_id = 1;
  string title = 2;
  string type_category = 3;
  int64 start_time = 4;
  int64 end_time = 5;
}

message UpdateScheduleItemRequest {
  string schedule_items_id = 1;
  string title = 2;
  string type_category = 3;
  int64 start_time = 4;
  int64 end_time = 5;
}

message SetEventFeesIncludedRequest {
  string events_id = 1;
  bool fees_included = 2;
}

message SetEventAchRequest {
  string events_id = 1;
  bool ach_enabled = 2;
}

message Event {
  string events_id = 1;
  string tenants_id = 2;
  string title = 3;
  string slug = 4;
  string description = 5;
  string status = 6;
  string category = 7;
  int64 start_date = 8;
  int64 end_date = 9;
  string image_path = 10;
  bool is_featured = 11;
  string layout_mode = 12;
  int32 total_capacity = 13;          // calculated: sum of ticket-type / table capacity (read-only)
  string venues_id = 14;
  string performers_json = 15;
  string sponsors_json = 16;
  bool fees_included = 17;
  string event_type = 18;            // Open | Table | Both
  string primary_image_id = 19;      // images_id of primary thumbnail (fallback event image)
  string extra_info_json = 20;       // JSON array [{key,value,isPublic,sortOrder}]
  bool ach_enabled = 21;             // admin opted this event in to ACH (tenant-gated)
  double venue_state_tax_rate = 22;
  double venue_county_tax_rate = 23;
  double venue_city_tax_rate = 24;
  double venue_local_tax_rate = 25;
  double venue_combined_tax_rate = 26;
}

message GetEventBySlugRequest { string slug = 1; }

message CreateEventRequest {
  string title = 1;
  string slug = 2;
  string description = 3;
  string status = 4;
  string category = 5;
  int64 start_date = 6;
  int64 end_date = 7;
  string image_path = 8;
  bool is_featured = 9;
  string layout_mode = 10;
  string venues_id = 14;
  int64 scheduled_publish_at = 15;
  string event_type = 16;            // Open | Table | Both; default Open
}

message CreateEventResponse { string events_id = 1; }

message UpdateEventRequest {
  string events_id = 1;
  string title = 2;
  string description = 3;
  string category = 4;
  int64 start_date = 5;
  int64 end_date = 6;
  string image_path = 7;
  bool is_featured = 8;
  string venues_id = 10;
  string event_type = 11;            // Open | Table | Both; empty = unchanged
  string extra_info_json = 12;       // JSON array [{key,value,isPublic,sortOrder}]; empty = unchanged
}

message ChangeEventStatusRequest {
  string events_id = 1;
  string status = 2;
}

message ListEventsRequest {
  ticketspan.common.PageRequest page = 1;
  string status = 2;
  string category = 3;
}

message SearchEventsRequest { string query = 1; }

message ListEventsResponse {
  repeated Event events = 1;
  ticketspan.common.PageMeta meta = 2;
}

message EventStats {
  string events_id = 1;
  int32 total_bookings = 2;
  int32 tickets_sold = 3;
  int64 revenue_cents = 4;
  int32 checked_in = 5;
}

message GenerateEventInfoRequest {
  string prompt = 1;
  optional string target_field = 2;
}

message GenerateEventInfoResponse {
  string title = 1;
  string description = 2;
  string category = 3;
  string start_date = 4;
  string end_date = 5;
  string venues_id = 6;
  VenueSuggestion venue_suggestion = 7;
}

message VenueSuggestion {
  string name = 1;
  string line1 = 2;
  string city = 3;
  string zip = 4;
  string state = 5;
}

message AiSettingsResponse {
  int32 prompt_max_length = 1;
}
