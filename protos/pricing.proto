syntax = "proto3";

package ticketspan.pricing;

option csharp_namespace = "TicketSpan.Protos.Pricing";

import "common.proto";

// The Pricing Module: the single source of truth for all pricing. Floor plan and
// checkout consume CalculatePrice; they never compute prices themselves.
service PricingService {
  rpc CreatePrice (CreatePriceRequest) returns (ticketspan.common.UuidValue);
  rpc UpdatePrice (UpdatePriceRequest) returns (ticketspan.common.AckResponse);
  rpc GetPrice (ticketspan.common.UuidValue) returns (Price);
  rpc ListPricesForEvent (ticketspan.common.UuidValue) returns (ListPricesResponse);
  rpc DeletePrice (ticketspan.common.UuidValue) returns (ticketspan.common.AckResponse);

  rpc CreatePriceRule (CreatePriceRuleRequest) returns (ticketspan.common.UuidValue);
  rpc UpdatePriceRule (UpdatePriceRuleRequest) returns (ticketspan.common.AckResponse);
  rpc DeletePriceRule (ticketspan.common.UuidValue) returns (ticketspan.common.AckResponse);
  rpc ListPriceRules (ticketspan.common.UuidValue) returns (ListPriceRulesResponse);
  rpc ListEventPriceRules (ticketspan.common.UuidValue) returns (ListPriceRulesResponse);

  rpc CalculatePrice (CalculatePriceRequest) returns (PriceBreakdown);
  rpc SetTenantDefaultFeeFormula (SetTenantDefaultFeeFormulaRequest) returns (ticketspan.common.AckResponse);
}

message Price {
  string prices_id = 1;
  string events_id = 2;
  string name = 3;
  string pricing_type = 4;          // TicketTier | Table
  int32 base_price_cents = 5;
  int32 per_attendee_cents = 6;
  bool is_all_inclusive = 7;
  string fee_formulas_id = 8;        // developer-only override; empty = tenant default
  reserved 9;                        // was parent_prices_id (add-ons removed)
  int32 max_quantity = 10;           // 0 = unlimited
  bool is_active = 11;
}

message CreatePriceRequest {
  string events_id = 1;
  string name = 2;
  string pricing_type = 3;
  int32 base_price_cents = 4;
  int32 per_attendee_cents = 5;
  bool is_all_inclusive = 6;
  string fee_formulas_id = 7;        // honored only for developers
  reserved 8;                        // was parent_prices_id (add-ons removed)
  int32 max_quantity = 9;
}

message UpdatePriceRequest {
  string prices_id = 1;
  string name = 2;
  int32 base_price_cents = 3;
  int32 per_attendee_cents = 4;
  bool is_all_inclusive = 5;
  int32 max_quantity = 6;
  bool is_active = 7;
  string fee_formulas_id = 8;        // applied only for developers
}

message ListPricesResponse {
  repeated Price prices = 1;
}

message PriceRule {
  string price_rules_id = 1;
  string prices_id = 2;              // set when scope = Price; empty for event-wide
  string name = 3;
  string rule_type = 4;              // Presale | LastMinute | TimeWindow | Dynamic
  int32 priority = 5;                // higher wins
  int32 price_cents = 6;
  int64 active_from = 7;             // unix seconds; 0 = unset
  int64 active_until = 8;            // unix seconds; 0 = unset
  int32 min_remaining = 9;           // -1 = unset
  int32 max_remaining = 10;          // -1 = unset
  bool is_active = 11;
  string scope = 12;                 // Price | Event
  string events_id = 13;             // set when scope = Event; empty otherwise
  int32 capacity = 14;               // discount applies only to this many people/seats (0 = no cap)
}

message CreatePriceRuleRequest {
  // owner_id is the prices_id when scope = Price, or the events_id when scope =
  // Event. Defaults to a per-price rule when scope is empty.
  string owner_id = 1;
  string name = 2;
  string rule_type = 3;
  int32 priority = 4;
  int32 price_cents = 5;
  int64 active_from = 6;
  int64 active_until = 7;
  int32 min_remaining = 8;
  int32 max_remaining = 9;
  string scope = 10;                 // Price | Event; empty = Price
  int32 capacity = 11;               // discount applies only to this many people/seats (0 = no cap)
}

message UpdatePriceRuleRequest {
  string price_rules_id = 1;
  string name = 2;
  string rule_type = 3;
  int32 priority = 4;
  int32 price_cents = 5;
  int64 active_from = 6;
  int64 active_until = 7;
  int32 min_remaining = 8;
  int32 max_remaining = 9;
  bool is_active = 10;
  int32 capacity = 11;               // discount applies only to this many people/seats (0 = no cap)
}

message ListPriceRulesResponse {
  repeated PriceRule rules = 1;
}

message CalculatePriceRequest {
  string prices_id = 1;
  int32 seats = 2;
  int64 at = 3;                      // unix seconds; 0 = now
  int32 remaining = 4;               // -1 = unknown
}

// Full server-authoritative breakdown for one priced line. Every surface (admin
// preview, customer checkout, persisted booking snapshot) renders these numbers;
// pricing math lives only in the backend engine (app.price_breakdown).
//   subtotal_cents/fee_cents/total_cents are retained as convenience aggregates:
//   subtotal = selling, fee = platform + gateway + tax, total = final.
message PriceBreakdown {
  int32 subtotal_cents = 1;
  int32 fee_cents = 2;
  int32 total_cents = 3;
  int32 base_price_cents = 4;        // original price before any rule
  int32 selling_price_cents = 5;     // price after the active rule
  int32 discount_cents = 6;          // base - selling (>= 0)
  string applied_price_rules_id = 7; // empty = no rule active
  string applied_rule_name = 8;      // empty = no rule active
  int32 platform_fee_cents = 9;
  int32 gateway_fee_cents = 10;
  int32 tax_cents = 11;
  int32 final_price_cents = 12;      // what the customer pays
  int32 organizer_net_cents = 13;    // what the organizer receives (= selling)
  string currency = 14;
}

message SetTenantDefaultFeeFormulaRequest {
  string tenants_id = 1;
  string fee_formulas_id = 2;        // empty = clear default
  string reason = 3;                 // required audit note
}
