syntax = "proto3";

package svyne.purchase;

option csharp_namespace = "Svyne.Protos.Purchase";

import "common.proto";

service PurchaseService {
  rpc CreatePurchase (CreatePurchaseRequest) returns (CreatePurchaseResponse);
  rpc ReserveOpenCapacity (ReserveOpenCapacityRequest) returns (CreatePurchaseResponse);
  rpc ConfirmPurchase (ConfirmPurchaseRequest) returns (svyne.common.AckResponse);
  rpc CancelPurchase (svyne.common.UuidValue) returns (svyne.common.AckResponse);
  rpc RefundPurchase (svyne.common.UuidValue) returns (svyne.common.AckResponse);
  rpc GetPurchase (svyne.common.UuidValue) returns (Purchase);
  rpc ListPurchases (ListPurchasesRequest) returns (ListPurchasesResponse);
  rpc GetPurchaseStats (svyne.common.UuidValue) returns (PurchaseStats);
}

service TicketService {
  rpc GetTicket (svyne.common.UuidValue) returns (Ticket);
  rpc ClaimTicket (ClaimTicketRequest) returns (svyne.common.AckResponse);
  rpc InviteTicket (InviteTicketRequest) returns (svyne.common.AckResponse);
  rpc ListPurchaseTickets (svyne.common.UuidValue) returns (ListTicketsResponse);
}

service CheckInService {
  rpc Scan (ScanRequest) returns (ScanResponse);
  rpc GetCheckInStats (svyne.common.UuidValue) returns (CheckInStats);
}

message Purchase {
  string purchases_id = 1;
  string tenants_id = 2;
  string purchase_number = 3;
  string status = 4;
  string users_id = 5;
  string events_id = 6;
  int32 subtotal_cents = 7;
  int32 fee_cents = 8;
  int32 total_cents = 9;
  int32 seats_reserved = 10;
}

message CreatePurchaseRequest {
  string events_id = 1;
  string tables_id = 2;
  int32 seats = 3;
  string event_ticket_types_id = 4;
  int32 subtotal_cents = 5;
  int32 fee_cents = 6;
  int32 total_cents = 7;
}

message ReserveOpenCapacityRequest {
  string events_id = 1;
  int32 seats = 2;
  string event_ticket_types_id = 3;
  int32 subtotal_cents = 4;
  int32 fee_cents = 5;
  int32 total_cents = 6;
}

message CreatePurchaseResponse {
  string purchases_id = 1;
  string purchase_number = 2;
}

message ConfirmPurchaseRequest {
  string purchases_id = 1;
  string qr_token = 2;
}

message ListPurchasesRequest {
  svyne.common.PageRequest page = 1;
  string events_id = 2;
  string status = 3;
}

message ListPurchasesResponse {
  repeated Purchase purchases = 1;
  svyne.common.PageMeta meta = 2;
}

message PurchaseStats {
  int32 total = 1;
  int32 paid = 2;
  int32 checked_in = 3;
  int64 revenue_cents = 4;
}

message Ticket {
  string purchase_tickets_id = 1;
  string ticket_code = 2;
  string qr_token = 3;
  int32 seat_number = 4;
  string status = 5;
  string guest_users_id = 6;
}

message ClaimTicketRequest {
  string token = 1;
}

message InviteTicketRequest {
  string purchase_tickets_id = 1;
  string email = 2;
}

message ListTicketsResponse {
  repeated Ticket tickets = 1;
}

message ScanRequest {
  string qr_token = 1;
  string events_id = 2;
}

message ScanResponse {
  bool valid = 1;
  string status = 2;
  string holder_name = 3;
  string message = 4;
}

message CheckInStats {
  int32 total = 1;
  int32 checked_in = 2;
  int32 remaining = 3;
}
