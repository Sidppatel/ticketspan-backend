syntax = "proto3";

package ticketspan.tenant;

option csharp_namespace = "TicketSpan.Protos.Tenant";

import "common.proto";

service TenantService {
  rpc CreateTenant (CreateTenantRequest) returns (CreateTenantResponse);
  rpc UpdateTenant (UpdateTenantRequest) returns (ticketspan.common.AckResponse);
  rpc ArchiveTenant (ticketspan.common.UuidValue) returns (ticketspan.common.AckResponse);
  rpc GetTenant (ticketspan.common.UuidValue) returns (Tenant);
  rpc GetMyTenant (ticketspan.common.Empty) returns (Tenant);
  rpc UpdateMyTenantContact (UpdateMyTenantContactRequest) returns (ticketspan.common.AckResponse);
  rpc UpdateMyTenantBranding (UpdateMyTenantBrandingRequest) returns (ticketspan.common.AckResponse);
  rpc GetPublicTenantBranding (PublicTenantBrandingRequest) returns (PublicTenantBranding);
  rpc ListTenants (ticketspan.common.PageRequest) returns (ListTenantsResponse);
  rpc ListPublicTenants (ticketspan.common.Empty) returns (ListPublicTenantsResponse);
  rpc ListTenantMembers (ticketspan.common.UuidValue) returns (ListTenantMembersResponse);
  rpc GetTenantStripeStatus (ticketspan.common.UuidValue) returns (TenantStripeStatus);
  rpc GetTenantStripeProfile (ticketspan.common.UuidValue) returns (TenantStripeProfile);
  rpc UpdateTenantStripeProfile (UpdateTenantStripeProfileRequest) returns (ticketspan.common.AckResponse);
}

message TenantStripeProfile {
  bool has_account = 1;
  string business_type = 2;
  string business_name = 3;
  string business_url = 4;
  string product_description = 5;
  string mcc = 6;
  string support_email = 7;
}

message UpdateTenantStripeProfileRequest {
  string tenants_id = 1;
  string business_type = 2;
  string business_name = 3;
  string business_url = 4;
  string product_description = 5;
  string mcc = 6;
  string support_email = 7;
}

message Tenant {
  string tenants_id = 1;
  string slug = 2;
  string name = 3;
  string legal_name = 4;
  string country_code = 5;
  int32 member_count = 6;
  int32 event_count = 7;
  int64 total_revenue_cents = 8;
  bool archived = 9;
  // Tenant default service-fee formula. Auto-applied to every new event price;
  // empty = no default set. Developer-only (set via PricingService).
  string default_fee_formulas_id = 10;
  string phone = 11;
  string address_line1 = 12;
  string address_line2 = 13;
  string city = 14;
  string state = 15;
  string zip = 16;
  string logo_url = 17;
  string brand_primary = 18;
  string brand_secondary = 19;
  string brand_accent = 20;
  string brand_background = 21;
  string brand_text = 22;
  string brand_button = 23;
  string brand_highlight = 24;
  // Whether this tenant may offer ACH bank-transfer payments (developer-managed).
  bool ach_enabled = 25;
  // JSON object of advanced theme-token overrides, e.g. {"stage":"#101010"}.
  string brand_tokens_json = 26;
  // ACH fee formula assigned to this tenant; empty = none (developer-managed).
  string ach_fee_formulas_id = 27;
}

message UpdateMyTenantBrandingRequest {
  string logo_images_id = 1;
  string brand_primary = 2;
  string brand_secondary = 3;
  string brand_accent = 4;
  string brand_background = 5;
  string brand_text = 6;
  string brand_button = 7;
  string brand_highlight = 8;
  string brand_tokens_json = 9;
}

message PublicTenantBrandingRequest {
  string slug = 1;
}

message PublicTenantBranding {
  string slug = 1;
  string name = 2;
  string logo_url = 3;
  string brand_primary = 4;
  string brand_secondary = 5;
  string brand_accent = 6;
  string brand_background = 7;
  string brand_text = 8;
  string brand_button = 9;
  string brand_highlight = 10;
  string brand_tokens_json = 11;
}

message UpdateMyTenantContactRequest {
  string phone = 1;
  string address_line1 = 2;
  string address_line2 = 3;
  string city = 4;
  string state = 5;
  string zip = 6;
}

message CreateTenantRequest {
  string slug = 1;
  string name = 2;
  string admin_email = 3;
  string admin_first_name = 4;
  string admin_last_name = 5;
  string legal_name = 6;
  string country_code = 7;
  // Stripe Connect onboarding prefill (all optional). Used to pre-create the
  // connected account so the Express onboarding form is pre-filled.
  string business_type = 8;        // "individual" | "company"
  string business_url = 9;
  string product_description = 10;
  string mcc = 11;                 // 4-digit Stripe merchant category code
  string support_email = 12;
}

message CreateTenantResponse {
  string tenants_id = 1;
  string admin_users_id = 2;
  string setup_url = 3;
}

message UpdateTenantRequest {
  string tenants_id = 1;
  string name = 2;
  string legal_name = 3;
  string country_code = 4;
}

message ListTenantsResponse {
  repeated Tenant tenants = 1;
  ticketspan.common.PageMeta meta = 2;
}

message PublicTenant {
  string slug = 1;
  string name = 2;
}

message ListPublicTenantsResponse {
  repeated PublicTenant tenants = 1;
}

message TenantMember {
  string users_id = 1;
  string email = 2;
  int32 role = 3;
  string display_name = 4;
}

message ListTenantMembersResponse {
  repeated TenantMember members = 1;
}

message TenantStripeStatus {
  string tenants_id = 1;
  string stripe_connected_account_id = 2;
  bool charges_enabled = 3;
  bool payouts_enabled = 4;
  bool details_submitted = 5;
}
